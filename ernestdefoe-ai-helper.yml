ernestdefoe-ai-helper:
  admin:
    title: AI Helper
    settings_intro: An AI support assistant that answers @mentions and support threads, grounded in your own forum content. Bring your own API key — usage and cost are tracked below.

    provider: AI provider
    base_url: API base URL
    base_url_help: Only for the OpenAI-compatible provider. Leave blank for OpenAI; set it for OpenRouter, Groq, Azure, a local model, etc.
    api_key: API key
    api_key_help: Your provider key (Anthropic or OpenAI-compatible). Stored on your server; used only when the bot answers.
    model: Model
    mode: Reply mode
    mode_auto: Auto — post answers directly
    mode_draft: Draft — hold for moderator approval
    bot_user_id: Bot account (user ID)
    bot_user_id_help: The forum user the bot posts as. Create a dedicated account and put its numeric ID here.
    tags: Watched tags
    tags_help: Tags the bot auto-watches — it answers every new post in these even without an @mention. @mentions still work everywhere. Select none to only answer explicit @mentions.
    tags_none: No tags found. Install and enable the Tags extension to use this.
    persona: Persona / extra guidance
    persona_help: Optional. Appended to the system prompt — tone, scope, things to always or never say.
    retrieval: Knowledge retrieval (RAG)
    retrieval_off: Off — only the current thread
    retrieval_fulltext: FULLTEXT — search your posts (no extra key)
    retrieval_vector: Vector — semantic search (needs embeddings key)
    embeddings_provider: Embeddings provider
    embeddings_none: None
    embeddings_key: Embeddings API key
    embeddings_key_help: Required only for Vector retrieval. Voyage AI or an OpenAI-compatible key. Cheap (cents per million tokens). Run "php flarum ai-helper:reindex" after enabling.
    embeddings_model: Embeddings model
    budget: Monthly budget (USD)
    budget_help: Hard cap. The bot pauses for the rest of the month when reached. Usage is shown above.
    enabled: Enable the assistant
    enabled_help: Master switch. Requires an API key and a bot account to be set.
    drafts_title: "Pending AI drafts ({count})"
    drafts_approve: Approve & post
    drafts_discard: Discard

  forum:
    summarize: Summarize with AI
    summary_title: Thread summary
    summary_loading: Reading the thread and writing a summary…
    summary_error: Couldn't generate a summary right now. Please try again later.
    summary_retry: Try again
    summary_copy: Copy
    summary_copied: Copied!
    summary_regenerate: Regenerate
    summary_ai_note: AI-generated — may be imperfect
    summary_model: "Generated by {model}"
