ernestdefoe-ai-helper:
  admin:
    title: AI Helper
    settings_intro: An AI support assistant that answers @mentions and support threads, grounded in your own forum content. Bring your own API key — usage and cost are tracked below.

    provider: AI provider
    base_url: API base URL
    base_url_help: Only for the OpenAI-compatible provider. Leave blank for OpenAI; set it for OpenRouter, Groq, Azure, a local model, etc.
    api_key: API key
    api_key_help: Your provider key (Anthropic or OpenAI-compatible). Stored on your server; used only when the bot answers.
    model: Model
    mode: Reply mode
    mode_auto: Auto — post answers directly
    mode_draft: Draft — hold for moderator approval
    bot_user_id: Bot account (user ID)
    bot_user_id_help: The forum user the bot posts as. Create a dedicated account and put its numeric ID here.
    process_queue: Process the queue on the scheduler
    process_queue_help: "For hosts without a persistent queue worker. When on, the per-minute scheduler (php flarum schedule:run) drains the queue each minute so bot replies, DM triage and notifications are processed. Leave OFF if you run a persistent worker — e.g. a dedicated `php flarum queue:work` daemon or a Horizon-managed Redis queue (running both wastes resources and races the worker)."
    tags: Watched tags
    tags_help: Tags the bot auto-watches — it answers every new post in these even without an @mention. @mentions still work everywhere. Select none to only answer explicit @mentions.
    tags_none: No tags found. Install and enable the Tags extension to use this.
    persona: Persona / extra guidance
    persona_help: Optional. Appended to the system prompt — tone, scope, things to always or never say.
    retrieval: Knowledge retrieval (RAG)
    retrieval_off: Off — only the current thread
    retrieval_fulltext: FULLTEXT — search your posts (no extra key)
    retrieval_vector: Vector — semantic search (needs embeddings key)
    embeddings_provider: Embeddings provider
    embeddings_none: None
    embeddings_key: Embeddings API key
    embeddings_key_help: Required only for Vector retrieval. Voyage AI or an OpenAI-compatible key. Cheap (cents per million tokens). Run "php flarum ai-helper:reindex" after enabling.
    embeddings_model: Embeddings model
    index_docs: Index extension docs
    index_docs_help: >
      Feed your installed extensions' own docs (README, composer description,
      settings & help text, changelog) into the knowledge base, so the bot
      answers from authoritative product info — not just what's been said in
      forum posts. Refreshes automatically: instantly when you Clear Cache, and
      once a day. No commands or shell access needed.
    docs_vendors: Limit doc indexing to vendors
    docs_vendors_help: >
      Optional. Comma-separated vendor prefixes (e.g. "ernestdefoe/") to index
      only your own extensions. Leave blank to index every enabled extension.
    budget: Monthly budget (USD)
    budget_help: Hard cap. The bot pauses for the rest of the month when reached. Usage is shown above.

    triage_enabled: Capture bugs & suggestions
    triage_enabled_help: When on, the bot classifies posts it answers and records bugs/feature requests below. High-confidence bugs auto-file a GitHub issue; everything else waits for your approval.
    dm_triage_enabled: Capture from direct messages
    dm_triage_enabled_help: When on, an admin can DM the bot account (e.g. paste audit results) and every bug/suggestion is logged to the queue/GitHub. The bot replies with what it logged. Requires flarum/messages; admin senders only.
    dm_chat_enabled: Reply to direct messages (chat)
    dm_chat_enabled_help: "When on, the bot replies conversationally to any direct message it's a participant in — like a private support chat — answering questions and acknowledging instructions. (Bug/suggestion capture above still applies to admin DMs.) Requires flarum/messages. Uses your AI budget, so members DMing the bot will consume tokens."
    github_token: GitHub token
    github_token_help: A fine-grained token with Issues read & write on your extension repos. Used to file issues. Stored on your server.
    triage_default_repo: Default repository
    triage_default_repo_help: Where to file when no tag mapping matches, as owner/repo (e.g. ernestdefoe/ai-helper).
    triage_repo_map: Tag → repository map
    triage_repo_map_help: Route by tag. One "slug=owner/repo" pair per line (or comma-separated). Use Auto-detect to fill this from your GitHub repos + forum tags, then review and Save.
    auto_detect: Auto-detect repositories
    auto_detect_result: "Matched {matched} of {repos} repos — review and Save."
    auto_detect_error: Couldn't auto-detect — add your GitHub token and Save first.
    triage_auto_confidence: Auto-file confidence (%)
    triage_auto_confidence_help: Bugs at or above this confidence are filed automatically; everything else waits in the queue. Set 0 to disable auto-filing.
    triage_panel_title: "Triage queue ({count})"
    triage_empty: Nothing captured yet. Bugs and suggestions members report will appear here.
    triage_approve: Approve & file issue
    triage_dismiss: Dismiss
    triage_view_issue: View issue
    triage_reported_by: "Reported by {name}"
    triage_pending: Pending
    triage_filed: Filed
    triage_bug: Bug
    triage_suggestion: Suggestion
    triage_filed_alert: Issue filed on GitHub.
    triage_file_error: Couldn't file the issue — check the GitHub token and repository.
    enabled: Enable the assistant
    enabled_help: Master switch. Requires an API key and a bot account to be set.
    drafts_title: "Pending AI drafts ({count})"
    drafts_approve: Approve & post
    drafts_discard: Discard

  forum:
    summarize: Summarize with AI
    summary_title: Thread summary
    summary_loading: Reading the thread and writing a summary…
    summary_error: Couldn't generate a summary right now. Please try again later.
    summary_retry: Try again
    summary_copy: Copy
    summary_copied: Copied!
    summary_regenerate: Regenerate
    summary_ai_note: AI-generated — may be imperfect
    summary_model: "Generated by {model}"
