flarum-gdpr:
  lib:
    data:
      marketplaceuserdata:
        export_description: "Exports the customer's marketplace data: orders, subscriptions, license keys and their authorised domains, telemetry hits, downloads, Composer tokens, refund requests, reviews, email notifications, manual activations, cart and grants."
        anonymize_description: "Wipes PII (name, email, phone, address, notes, IPs, user-agents, license domains) from every marketplace record while preserving aggregate rows for accounting. Revokes Composer tokens and empties the cart."
        delete_description: "Performs the same wipe as anonymisation. Aggregate marketplace rows are kept for accounting; identifying fields are cleared."
